<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortress Strategy Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .header-title {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-main);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }
        h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
        h3 { font-size: 1.1rem; color: var(--primary); margin-top: 1.5rem; margin-bottom: 0.75rem; }
        
        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--text-muted); }
        
        input, select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        input:disabled, select:disabled {
            background-color: #f1f5f9;
            cursor: not-allowed;
        }
        
        .milestones-group { display: flex; gap: 0.5rem; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        th { background-color: var(--background); font-weight: 600; }
        .text-success { color: var(--success); font-weight: 600; }
        .text-warning { color: var(--warning); font-weight: 600; }
        
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1 class="header-title">Fortress Strategy Simulator v4.0</h1>

    <div class="container">
        <div class="card">
            <h2>Parameters</h2>
            
            <h3>Base Setup</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Starting Capital (£)</label>
                    <input type="number" id="startCapital" value="20000" oninput="calculate()">
                </div>
                <div class="form-group">
                    <label>Injection Amount (£)</label>
                    <input type="number" id="injectionAmount" value="50" oninput="calculate()">
                </div>
            </div>
            <div class="form-group">
                <label>Injection Frequency</label>
                <select id="frequency" onchange="calculate()">
                    <option value="daily" selected>Daily (21 Trading Days)</option>
                    <option value="weekly">Weekly (4.2 Weeks)</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>

            <h3>Extra Top-Up (ISA)</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Top-Up Amount (£)</label>
                    <input type="number" id="isaAmount" value="0" oninput="calculate()">
                </div>
                <div class="form-group">
                    <label>Frequency</label>
                    <select id="isaFreq" onchange="handleIsaChange()">
                        <option value="yearly" selected>Yearly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Yearly Timing</label>
                <select id="isaTiming" onchange="calculate()">
                    <option value="start" selected>Start of Year (Month 1)</option>
                    <option value="end">End of Year (Month 12)</option>
                </select>
            </div>

            <h3>Market & Strategy</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Harvest Target (%)</label>
                    <input type="number" id="harvestRate" value="3.14" step="0.01" oninput="calculate()">
                </div>
                <div class="form-group">
                    <label>Annual Inflation (%)</label>
                    <input type="number" id="inflation" value="2.5" step="0.1" oninput="calculate()">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Profit Reinvested (%)</label>
                    <input type="number" id="reinvestPercent" value="100" min="0" max="100" oninput="calculate()">
                </div>
                <div class="form-group">
                    <label>Compound Timing</label>
                    <select id="timing" onchange="calculate()">
                        <option value="end" selected>End of Month</option>
                        <option value="immediate">Immediate</option>
                    </select>
                </div>
            </div>

            <h3>Milestones</h3>
            <div class="form-group">
                <label>Target Basis</label>
                <select id="milestoneBasis" onchange="calculate()">
                    <option value="nominal" selected>Nominal Balance (Raw Numbers)</option>
                    <option value="real">Real Balance (Inflation Adjusted)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Milestone Targets (£)</label>
                <div class="milestones-group">
                    <input type="number" id="m1" value="250000" oninput="calculate()">
                    <input type="number" id="m2" value="500000" oninput="calculate()">
                    <input type="number" id="m3" value="1000000" oninput="calculate()">
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Growth Timeline</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Target Crossed</th>
                            <th>Time to Reach</th>
                            <th>Total Injected</th>
                            <th>Reinvested Profit</th>
                            <th>Withdrawn Cash</th>
                            <th>Real Value (Adjusted)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>

            <h2>Capital Split (At Highest Achieved Milestone)</h2>
            <div class="chart-container">
                <canvas id="splitChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        const formatMoney = (num) => {
            return new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', maximumFractionDigits: 0 }).format(num);
        };

        function handleIsaChange() {
            const freq = document.getElementById('isaFreq').value;
            const timingSelect = document.getElementById('isaTiming');
            timingSelect.disabled = (freq === 'monthly');
            calculate();
        }

        function calculate() {
            // 1. Fetch Inputs
            const P0 = parseFloat(document.getElementById('startCapital').value) || 0;
            const regInjection = parseFloat(document.getElementById('injectionAmount').value) || 0;
            const regFreq = document.getElementById('frequency').value;
            
            const isaAmount = parseFloat(document.getElementById('isaAmount').value) || 0;
            const isaFreq = document.getElementById('isaFreq').value;
            const isaTiming = document.getElementById('isaTiming').value;

            const rate = (parseFloat(document.getElementById('harvestRate').value) || 0) / 100;
            const reinvestPercent = (parseFloat(document.getElementById('reinvestPercent').value) || 0) / 100;
            const timing = document.getElementById('timing').value;
            const inflationRate = (parseFloat(document.getElementById('inflation').value) || 0) / 100;
            const basis = document.getElementById('milestoneBasis').value;

            const targets = [
                parseFloat(document.getElementById('m1').value) || 0,
                parseFloat(document.getElementById('m2').value) || 0,
                parseFloat(document.getElementById('m3').value) || 0
            ].sort((a, b) => a - b);

            // 2. Standardize Base Monthly Injection
            let baseMonthlyInjection = 0;
            if (regFreq === 'daily') baseMonthlyInjection = regInjection * 21;
            if (regFreq === 'weekly') baseMonthlyInjection = regInjection * 4.2;
            if (regFreq === 'monthly') baseMonthlyInjection = regInjection;

            // 3. Setup Loop Variables
            let currentVal = P0;
            let totalInjected = P0;
            let totalWithdrawn = 0;
            let totalReinvested = 0;
            let monthCount = 0;
            let results = [];
            let targetIndex = 0;
            const maxMonths = 1200; // 100 year hard stop

            // 4. Run the Engine
            while (targetIndex < targets.length && monthCount < maxMonths) {
                monthCount++;
                
                // Determine ISA Injection for this specific month
                let currentIsaInjection = 0;
                if (isaFreq === 'monthly') {
                    currentIsaInjection = isaAmount / 12;
                } else if (isaFreq === 'yearly') {
                    if (isaTiming === 'start' && monthCount % 12 === 1) currentIsaInjection = isaAmount;
                    if (isaTiming === 'end' && monthCount % 12 === 0) currentIsaInjection = isaAmount;
                }

                const totalMonthlyInjection = baseMonthlyInjection + currentIsaInjection;
                
                // Calculate Profit
                let baseForProfit = currentVal;
                if (timing === 'immediate') {
                    baseForProfit += totalMonthlyInjection;
                }

                const rawProfit = baseForProfit * rate;
                const profitToReinvest = rawProfit * reinvestPercent;
                const profitToWithdraw = rawProfit - profitToReinvest;

                // Update Balances
                currentVal += totalMonthlyInjection + profitToReinvest;
                totalInjected += totalMonthlyInjection;
                totalReinvested += profitToReinvest;
                totalWithdrawn += profitToWithdraw;

                // Calculate Real (Inflation Adjusted) Value
                // P_real = P_nominal / (1 + r)^t
                const realValue = currentVal / Math.pow(1 + inflationRate, monthCount / 12);
                
                // Check against milestone based on toggle
                const checkValue = (basis === 'real') ? realValue : currentVal;

                if (checkValue >= targets[targetIndex]) {
                    const y = Math.floor(monthCount / 12);
                    const m = monthCount % 12;
                    results.push({
                        target: targets[targetIndex],
                        timeStr: `${y}y ${m}m`,
                        injected: totalInjected,
                        reinvested: totalReinvested,
                        withdrawn: totalWithdrawn,
                        nominalValue: currentVal,
                        realValue: realValue
                    });
                    targetIndex++;
                }
            }

            // 5. Update UI Table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            results.forEach(res => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${formatMoney(res.target)}</strong></td>
                    <td>${res.timeStr}</td>
                    <td>${formatMoney(res.injected)}</td>
                    <td class="text-success">${formatMoney(res.reinvested)}</td>
                    <td class="text-warning">${formatMoney(res.withdrawn)}</td>
                    <td>${formatMoney(res.realValue)}</td>
                `;
                tbody.appendChild(tr);
            });

            // 6. Update Pie Chart
            updateChart(results[results.length - 1]);
        }

        function updateChart(finalResult) {
            const ctx = document.getElementById('splitChart').getContext('2d');
            if (myChart) myChart.destroy();
            if (!finalResult) return;

            const dataValues = [finalResult.injected, finalResult.reinvested];
            const labels = ['Out of Pocket Injected', 'Reinvested Profit (Active)'];
            const bgColors = ['#3b82f6', '#16a34a'];

            // Only add the Withdrawn Cash slice if it exists
            if (finalResult.withdrawn > 0) {
                dataValues.push(finalResult.withdrawn);
                labels.push('Withdrawn Cash');
                bgColors.push('#f59e0b'); // Warning Yellow/Orange
            }

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: bgColors,
                        borderWidth: 0,
                        hoverOffset: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' ' + formatMoney(context.raw);
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize on load
        window.onload = function() {
            handleIsaChange();
        };
    </script>
</body>
</html>
